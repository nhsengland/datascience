name: Submit a Project Page
description: Submit a new or updated project page to the NHS England Data Science website
title: "[Project Submission] "
labels: ["project-submission"]

body:
  - type: markdown
    attributes:
      value: |
        # Project Page Submission

        Thank you for contributing to the NHS England Data Science website! Please fill out the form below with details about your project.

        **Before you start:**
        - Review the [project template](https://github.com/NHSEngland/datascience/blob/main/docs/our_work/template-project.md) to understand the structure
        - Look through existing [project pages](https://nhsengland.github.io/datascience/our_work/) for examples
        - Read the [contributing guidelines](https://github.com/NHSEngland/datascience/blob/main/CONTRIBUTE.md#project-page)

  - type: input
    id: project_title
    attributes:
      label: Project Title
      description: The full name of your project (e.g., "AI Models for Shortlisting Interview Candidates")
      placeholder: "Project title"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: One-Line Summary
      description: A concise summary of what your project does (max 150 characters)
      placeholder: "Brief description of the project in one line"
    validations:
      required: true

  - type: input
    id: origin
    attributes:
      label: Origin (Optional)
      description: Where this work originated (e.g., "AI Skunkworks", "NHSE", "NHSD", etc.)
      placeholder: "e.g., AI Skunkworks"

  - type: checkboxes
    id: tags
    attributes:
      label: Project Tags
      description: |
        Select all tags that apply to your project. Choose from each category as relevant:
        - **Domain Areas**: Primary care, Secondary care, Social Care, Emergency care, Diseases, Public/Population Health, Workforce & Allocation, Prescribing, Financial
        - **Techniques**: Forecasting, Classification, Computer Vision, Deep Learning, Large Language Models (LLM), Machine Learning, Neural Networks, Natural Language Processing (NLP), Linkage, Simulation
        - **Project Type**: Best Practice Guidance, Data Validation, Documentation, Ethics, Explainability, Generation, Linkage, Modelling, Reproducible Analytical Pipeline (RAP), Research
        - **Data Types**: Structured, Unstructured, Multi-modal, Sound/Audio, Genomics, Video/Image, Text Data, Time Series, Patient Identifiable, Synthetic, Open Data, Pseudonymised
        - **Coding Language**: Python, SQL, R, Web Development (e.g. Javascript, HTML, CSS)
        - **Status**: Work in Progress, Complete, On Pause, In Development, Retired, Deployed, Experimental
      options:
        - label: "Domain: Primary care"
          value: "primary care"
        - label: "Domain: Secondary care"
          value: "secondary care"
        - label: "Domain: Social Care"
          value: "social care"
        - label: "Domain: Emergency care"
          value: "emergency care"
        - label: "Domain: Diseases"
          value: "diseases"
        - label: "Domain: Public/Population Health"
          value: "population health"
        - label: "Domain: Workforce & Allocation"
          value: "workforce"
        - label: "Domain: Prescribing"
          value: "prescribing"
        - label: "Domain: Financial"
          value: "financial"
        - label: "Technique: Forecasting"
          value: "forecasting"
        - label: "Technique: Classification"
          value: "classification"
        - label: "Technique: Computer Vision"
          value: "computer vision"
        - label: "Technique: Deep Learning"
          value: "deep learning"
        - label: "Technique: Large Language Models (LLM)"
          value: "llm"
        - label: "Technique: Machine Learning"
          value: "machine learning"
        - label: "Technique: Neural Networks"
          value: "neural networks"
        - label: "Technique: Natural Language Processing (NLP)"
          value: "natural language processing"
        - label: "Technique: Linkage"
          value: "linkage"
        - label: "Technique: Simulation"
          value: "simulation"
        - label: "Type: Best Practice Guidance"
          value: "best practice"
        - label: "Type: Data Validation"
          value: "data validation"
        - label: "Type: Documentation"
          value: "documentation"
        - label: "Type: Ethics"
          value: "ethics"
        - label: "Type: Explainability"
          value: "explainability"
        - label: "Type: Generation"
          value: "generation"
        - label: "Type: Linkage"
          value: "linkage"
        - label: "Type: Modelling"
          value: "modelling"
        - label: "Type: Reproducible Analytical Pipeline (RAP)"
          value: "rap"
        - label: "Type: Research"
          value: "research"
        - label: "Data Type: Structured"
          value: "structured data"
        - label: "Data Type: Unstructured"
          value: "unstructured data"
        - label: "Data Type: Multi-modal"
          value: "multi modal"
        - label: "Data Type: Sound/Audio"
          value: "audio data"
        - label: "Data Type: Genomics"
          value: "genomics data"
        - label: "Data Type: Video/Image"
          value: "visual data"
        - label: "Data Type: Text Data"
          value: "text data"
        - label: "Data Type: Time Series"
          value: "time series"
        - label: "Data Access: Patient Identifiable"
          value: "patient identifiable data"
        - label: "Data Access: Synthetic"
          value: "synthetic data"
        - label: "Data Access: Open Data"
          value: "open data"
        - label: "Data Access: Pseudonymised"
          value: "pseudonymised"
        - label: "Language: Python"
          value: "python"
        - label: "Language: SQL"
          value: "sql"
        - label: "Language: R"
          value: "r"
        - label: "Language: Web Development (e.g. Javascript, HTML, CSS)"
          value: "webdev"
        - label: "Status: Work in Progress"
          value: "wip"
        - label: "Status: Complete"
          value: "complete"
        - label: "Status: On Pause"
          value: "paused"
        - label: "Status: In Development"
          value: "in development"
        - label: "Status: Retired"
          value: "retired"
        - label: "Status: Deployed"
          value: "deployed"
        - label: "Status: Experimental"
          value: "experimental"
    validations:
      required: true

  - type: textarea
    id: project_description
    attributes:
      label: Project Description
      description: |
        Describe your project. Include:
        1. **Problem Statement**: What problem did you solve?
        2. **Solution**: How did you solve it using data science?
        3. **Key Results**: What were the outcomes/impact?

        Format your response in Markdown. Use clear headings and structure. Aim for 200-500 words.
      placeholder: |
        ## Problem
        [Describe the problem here]

        ## Solution
        [Describe your approach here]

        ## Results
        [Describe key outcomes and impact here]
    validations:
      required: true

  - type: textarea
    id: relevant_links
    attributes:
      label: Relevant Links (Optional)
      description: |
        Any relevant outputs or links for this project.

        Format each link as:
        ```
        Link Name: https://url-here
        ```

        Examples:
        ```
        Open Source Code: https://github.com/example
        Case Study: https://example.com/case-study
        Published Paper: https://arxiv.org/example
        Live Tool: https://example.com/tool
        ```
      placeholder: |
        Open Source Code: https://github.com/...
        Case Study: https://example.com/case-study

  - type: dropdown
    id: project_status
    attributes:
      label: Project Status
      description: Is this a current or past project?
      options:
        - "Current Project"
        - "Past Project"
    validations:
      required: true

  - type: input
    id: project_year
    attributes:
      label: Year (if Past Project)
      description: If you selected "Past Project" above, enter the year the project concluded (e.g., 2024, 2023)
      placeholder: "e.g., 2024"

  - type: dropdown
    id: main_work_area
    attributes:
      label: Main Work Area Category
      description: Select the primary category where this project fits within the Data Science team's work
      options:
        - "Predictive Analytics Products"
        - "Data Science for Linked/Longitudinal Data"
        - "Natural Language Processing Products"
        - "Data Science Capability"
        - "Research & Development"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Adding Images (Optional but Recommended)

        You can include images directly in your **Project Description** field above!

        **How to add images:**
        1. While writing your description, simply drag and drop images into the text area, or paste them (Ctrl/Cmd+V)
        2. GitHub will automatically upload them and insert markdown like `![image](https://github.com/...)`
        3. When you submit this issue, the workflow will automatically:
           - Download all images from the issue body
           - Save them to `docs/images/our_work/[project-slug]/`
           - Update the markdown to use local paths
        4. Supported formats: PNG, JPG, JPEG, GIF
        5. Recommended: Include a cover image or diagram at least 400x300px for best display

        **Note:** You don't need to manually write image paths — just drag, drop, and submit!

  - type: markdown
    attributes:
      value: |
        ## Next Steps

        Once you submit this form:
        1. A GitHub Action will parse your submission and process any images
        2. It will generate a properly formatted Markdown project page
        3. It will update the website navigation (mkdocs.yml)
        4. It will create a Pull Request with all changes for review
        5. The team will review and merge your PR
